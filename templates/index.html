{% extends "base.html" %}
{% block content %}
<div class="hero">

    <div style="display: flex; justify-content: center; gap: 15px;">

    </div>

        <div style="font-weight:700">ดูแลผู้สูงอายุ</div>
    </div>
    <div class="service-card">
        <div class="service-icon">💉</div>
        <div style="font-weight:700">หัตถการที่บ้าน</div>
    </div>
    <div class="service-card">
        <div class="service-icon">🦽</div>

    </div>
